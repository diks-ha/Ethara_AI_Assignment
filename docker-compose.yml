services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inventory_net

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://inventory:inventory_password@postgres:5432/inventory
      SECRET_KEY: replace-with-a-long-random-secret
      FRONTEND_URL: http://localhost:3000
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    networks:
      - inventory_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    networks:
      - inventory_net

volumes:
  postgres_data:

networks:
  inventory_net:
    driver: bridge
